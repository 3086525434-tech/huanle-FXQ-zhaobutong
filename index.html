<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>欢乐找不同</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",Arial,sans-serif;color:#442333;background:linear-gradient(180deg,#fff0f6,#eaf8ff 45%,#fff6dc);overflow-x:hidden}.screen{min-height:100vh;padding:24px;display:none}.screen.active{display:block}.home{display:flex;align-items:center;justify-content:center;text-align:center}.card{background:rgba(255,255,255,.86);border-radius:28px;box-shadow:0 18px 50px rgba(84,44,72,.16);backdrop-filter:blur(12px)}.hero{max-width:760px;padding:52px 28px}.emoji{font-size:72px}.title{font-size:clamp(30px,5vw,54px);font-weight:900;line-height:1.25;margin:14px 0}.sub{color:#80536a;line-height:1.7}.name{width:min(420px,90%);height:52px;border-radius:999px;border:2px solid #ffd1e3;padding:0 18px;font-size:18px;text-align:center;margin:24px 0 14px}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#ff6aa2,#ff9f43);color:white;font-weight:900;font-size:20px;padding:14px 34px;cursor:pointer;box-shadow:0 14px 30px rgba(255,106,162,.35)}.btn.alt{background:linear-gradient(135deg,#00c6ff,#0072ff)}.top{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}.level{font-weight:900;font-size:24px}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{background:#fff;border-radius:999px;padding:8px 12px;font-weight:800}.tips{text-align:center;margin:14px;color:#7b5264}.imgs{display:grid;grid-template-columns:1fr 1fr;gap:14px}.imgBox{padding:12px;overflow:hidden}.label{text-align:center;font-weight:900;margin:0 0 8px}.picWrap{position:relative}.pic{width:100%;display:block;border-radius:18px;user-select:none}.rightWrap{cursor:crosshair}.mark{position:absolute;transform:translate(-50%,-50%);border:5px solid #ff1744;border-radius:50%;pointer-events:none;animation:pulse .7s infinite alternate}.wrongTap{position:absolute;transform:translate(-50%,-50%);color:#ff1744;font-size:32px;font-weight:900;pointer-events:none;animation:fade .5s forwards}@keyframes pulse{from{box-shadow:0 0 0 3px rgba(255,23,68,.18)}to{box-shadow:0 0 0 14px rgba(255,23,68,.07)}}@keyframes fade{to{opacity:0;transform:translate(-50%,-70%)}}.actions{text-align:center;margin-top:18px}.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.32);z-index:20;padding:20px}.modal.show{display:flex}.blur{filter:blur(8px)}.dialog{max-width:500px;width:min(90vw,500px);padding:42px 26px;text-align:center}.modalTitle{font-size:clamp(34px,7vw,52px);font-weight:900;color:#ff4f93}.modalSub{font-size:20px;margin:20px 0 28px;line-height:1.6}.end{display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,rgba(255,106,162,.45),rgba(122,230,255,.35)),url('assets/level5_right.jpg');background-size:cover;background-position:center}.end .panel{max-width:760px;padding:38px 24px;backdrop-filter:blur(18px)}.people{height:190px;display:flex;align-items:center;justify-content:center;gap:40px}.person{font-size:96px;animation:dance .45s infinite alternate}.p2{animation-delay:.2s}@keyframes dance{from{transform:translateY(0) rotate(-8deg) scale(1)}to{transform:translateY(-18px) rotate(10deg) scale(1.12)}}.rank{margin-top:20px;text-align:left;padding:16px}.rank h3{text-align:center}.rankItem{display:flex;justify-content:space-between;border-bottom:1px solid #ffe0ec;padding:10px 4px;font-weight:700}@media(max-width:860px){.screen{padding:12px}.imgs{grid-template-columns:1fr}.top{justify-content:center}.pic{max-height:none}.hero{padding:40px 18px}}
</style></head><body>
<section id="home" class="screen home active"><div class="hero card"><div class="emoji">🔍💕</div><div class="title">欢乐找不同：测测你是否真的了解方小权？</div><div class="sub">每关 30 秒，找出右图所有不同点。点错三次或超时立即失败。多人一起玩可以输入昵称排行。</div><input id="nameInput" class="name" placeholder="输入昵称"><br><button class="btn" id="enterBtn">进入游戏</button></div></section>
<section id="game" class="screen"><div id="gameContent"><div class="top card"><div class="level" id="levelText"></div><div class="stats"><div class="pill">⏱ <span id="timeText">30</span>s</div><div class="pill">✅ <span id="foundText">0</span>/<span id="needText">3</span></div><div class="pill">❌ <span id="wrongText">0</span>/3</div><div class="pill">🏆 <span id="scoreText">0</span></div></div></div><div class="tips">点击右边图片的不同处，找齐后可以进入下一关</div><div class="imgs"><div class="imgBox card"><div class="label">左图</div><img id="leftImg" class="pic"></div><div class="imgBox card"><div class="label">右图</div><div id="rightWrap" class="picWrap rightWrap"><img id="rightImg" class="pic"></div></div></div><div class="actions"><button id="submitBtn" class="btn alt">提前交答案</button></div></div></section>
<section id="end" class="screen end"><div class="panel card"><div class="modalTitle">最终通关奖励</div><div class="people"><div class="person">🕺</div><div class="person p2">💃</div></div><div class="modalSub">恭喜通关！你获得了小权的认可！</div><div class="pill" style="display:inline-block">最终得分：<span id="finalScore"></span></div><br><br><button class="btn" id="againBtn">再玩一次</button><button class="btn alt" id="shareBtn">复制链接邀请朋友</button><div class="rank card"><h3>多人排行榜</h3><div id="rankList"></div></div></div></section>
<div id="modal" class="modal"><div class="dialog card"><div id="modalTitle" class="modalTitle"></div><div id="modalSub" class="modalSub"></div><button id="modalBtn" class="btn"></button></div></div>
<script>
const LEVELS=[{"id": 1, "title": "第一关：新手", "left": "assets/level1_left.jpg", "right": "assets/level1_right.jpg", "time": 30, "need": 3, "answers": [{"x": 229, "y": 556, "r": 130}, {"x": 466, "y": 611, "r": 107}, {"x": 308, "y": 842, "r": 156}]}, {"id": 2, "title": "第二关：简单", "left": "assets/level2_left.jpg", "right": "assets/level2_right.jpg", "time": 30, "need": 3, "answers": [{"x": 598, "y": 424, "r": 103}, {"x": 805, "y": 682, "r": 101}, {"x": 152, "y": 840, "r": 103}]}, {"id": 3, "title": "第三关：困难", "left": "assets/level3_left.jpg", "right": "assets/level3_right.jpg", "time": 30, "need": 3, "answers": [{"x": 243, "y": 209, "r": 46}, {"x": 670, "y": 227, "r": 65}, {"x": 642, "y": 977, "r": 36}]}, {"id": 4, "title": "第四关：地狱!", "left": "assets/level4_left.jpg", "right": "assets/level4_right.jpg", "time": 30, "need": 3, "answers": [{"x": 279, "y": 384, "r": 48}, {"x": 495, "y": 646, "r": 46}, {"x": 40, "y": 714, "r": 45}]}, {"id": 5, "title": "第五关：权夫💕", "left": "assets/level5_left.jpg", "right": "assets/level5_right.jpg", "time": 30, "need": 3, "answers": [{"x": 514, "y": 330, "r": 76}, {"x": 652, "y": 670, "r": 92}, {"x": 63, "y": 773, "r": 72}]}];
let idx=0,level=null,timeLeft=30,wrong=0,found=[],marks=[],score=0,timer=null,totalTime=0,player='匿名玩家';
const $=id=>document.getElementById(id);let audioCtx=null,bgTimer=null,endingTimer=null;
function audio(){if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();return audioCtx}
function beep(freq=440,dur=.12,type='sine',vol=.08){const c=audio(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.stop(c.currentTime+dur)}
function melody(notes,tempo=160,vol=.055){const c=audio();notes.forEach((n,i)=>{if(!n)return;const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=n;g.gain.value=vol;o.connect(g);g.connect(c.destination);const t=c.currentTime+i*60/tempo;o.start(t);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);o.stop(t+.24)})}
function startBg(){clearInterval(bgTimer);melody([523,659,784,659,587,698,880,698],180,.035);bgTimer=setInterval(()=>melody([523,659,784,659,587,698,880,698],180,.035),2800)}
function stopBg(){clearInterval(bgTimer);bgTimer=null}function correct(){melody([784,988,1175],280,.075)}function wrongTone(){melody([220,196,174],220,.075)}function passMusic(){melody([523,659,784,1046,784,1046,1175],240,.075)}function failMusic(){melody([330,294,262],170,.075)}function endingMusic(){clearInterval(endingTimer);const n=[523,659,784,1046,988,784,880,1046,1175,1046];melody(n,220,.07);endingTimer=setInterval(()=>melody(n,220,.07),2800)}
function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active')}
function popup(title,sub,btn,cb){$('gameContent').classList.add('blur');$('modalTitle').textContent=title;$('modalSub').textContent=sub;$('modalBtn').textContent=btn;$('modal').classList.add('show');$('modalBtn').onclick=()=>{$('modal').classList.remove('show');$('gameContent').classList.remove('blur');cb&&cb()}}
function initLevel(){level=LEVELS[idx];timeLeft=30;wrong=0;found=[];marks=[];$('levelText').textContent=level.title;$('leftImg').src=level.left;$('rightImg').src=level.right;$('timeText').textContent=timeLeft;$('wrongText').textContent=0;$('foundText').textContent=0;$('needText').textContent=level.need;$('scoreText').textContent=score;$('rightWrap').querySelectorAll('.mark,.wrongTap').forEach(e=>e.remove());show('game');popup(level.title,'准备好了吗？本关限时 30 秒','开始找不同',startLevel)}
function startLevel(){clearInterval(timer);timer=setInterval(()=>{timeLeft--;$('timeText').textContent=timeLeft;if(timeLeft<=0)fail()},1000)}
function imgPos(ev){const img=$('rightImg'),r=img.getBoundingClientRect();return {x:(ev.clientX-r.left)*img.naturalWidth/r.width,y:(ev.clientY-r.top)*img.naturalHeight/r.height,rx:ev.clientX-r.left,ry:ev.clientY-r.top,scale:r.width/img.naturalWidth}}
$('rightWrap').onclick=ev=>{if(!level||$('modal').classList.contains('show'))return;const p=imgPos(ev);let hit=-1;for(let i=0;i<level.answers.length;i++){if(found.includes(i))continue;let a=level.answers[i],d=Math.hypot(p.x-a.x,p.y-a.y);if(d<=a.r){hit=i;break}}if(hit>=0){found.push(hit);let a=level.answers[hit],m=document.createElement('div'),scale=p.scale;m.className='mark';m.style.left=a.x*scale+'px';m.style.top=a.y*scale+'px';m.style.width=a.r*2*scale+'px';m.style.height=a.r*2*scale+'px';$('rightWrap').appendChild(m);$('foundText').textContent=found.length;correct();if(found.length>=level.need)pass()}else{wrong++;$('wrongText').textContent=wrong;wrongTone();let w=document.createElement('div');w.className='wrongTap';w.textContent='×';w.style.left=p.rx+'px';w.style.top=p.ry+'px';$('rightWrap').appendChild(w);setTimeout(()=>w.remove(),500);if(wrong>=3)fail()}}
function pass(){clearInterval(timer);score+=100+timeLeft*2-wrong*5;totalTime+=30-timeLeft;$('scoreText').textContent=score;passMusic();popup('恭喜通关！','你获得了小权的认可！',idx===LEVELS.length-1?'查看最终奖励':'下一关',()=>{idx++;idx>=LEVELS.length?finish():initLevel()})}
function fail(){clearInterval(timer);failMusic();popup('挑战失败','很遗憾未能得到小权的认可~','重新挑战',()=>{idx=0;score=0;totalTime=0;initLevel()})}
function finish(){stopBg();endingMusic();show('end');$('finalScore').textContent=score;let list=JSON.parse(localStorage.getItem('rankList')||'[]');list.push({name:player,score,time:totalTime,date:new Date().toLocaleDateString()});list.sort((a,b)=>b.score-a.score||a.time-b.time);list=list.slice(0,20);localStorage.setItem('rankList',JSON.stringify(list));renderRank(list)}
function renderRank(list){$('rankList').innerHTML=list.map((x,i)=>`<div class="rankItem"><span>${i+1}. ${x.name}</span><span>${x.score}分</span></div>`).join('')||'<div style="text-align:center">暂无排行</div>'}
$('enterBtn').onclick=()=>{player=$('nameInput').value.trim()||'匿名玩家';localStorage.setItem('playerName',player);audio();startBg();idx=0;score=0;totalTime=0;initLevel()};$('submitBtn').onclick=()=>found.length>=level.need?pass():(wrong++,$('wrongText').textContent=wrong,wrongTone(),wrong>=3&&fail());$('againBtn').onclick=()=>{clearInterval(endingTimer);startBg();idx=0;score=0;totalTime=0;initLevel()};$('shareBtn').onclick=async()=>{try{await navigator.clipboard.writeText(location.href);alert('链接已复制，发给朋友就能玩！')}catch(e){prompt('复制这个链接发给朋友：',location.href)}};$('nameInput').value=localStorage.getItem('playerName')||'';
</script></body></html>
